<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Math Practice ⭐</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#f0eeff 0%,#e8f7f2 100%);min-height:100vh;padding:16px;}
#app{max-width:560px;margin:auto;}

.header{text-align:center;margin-bottom:1rem;}
.header h1{font-size:24px;font-weight:800;color:#3C3489;}
.header p{font-size:13px;color:#888;margin-top:3px;}
.stars{font-size:22px;margin-bottom:4px;}

.op-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:1rem;}
.op-btn{width:58px;height:58px;border-radius:14px;border:2px solid #e0ddf7;background:#fff;font-size:22px;cursor:pointer;color:#534AB7;font-weight:800;transition:all .15s;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(83,74,183,.08);touch-action:manipulation;}
.op-btn.active{background:#AFA9EC;border-color:#7F77DD;color:#26215C;}

.level-bar{display:flex;gap:7px;justify-content:center;margin-bottom:1rem;flex-wrap:wrap;}
.level-pill{padding:6px 14px;border-radius:20px;font-size:13px;border:1.5px solid #e0ddf7;color:#888;cursor:pointer;background:#fff;font-weight:600;touch-action:manipulation;}
.level-pill.active{background:#9FE1CB;color:#085041;border-color:#5DCAA5;font-weight:700;}

.learn-bar{text-align:center;margin-bottom:1rem;}
.learn-btn{padding:9px 22px;border-radius:20px;background:#fff;border:2px solid #7F77DD;color:#534AB7;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;cursor:pointer;touch-action:manipulation;}

.q-dots{display:flex;gap:9px;justify-content:center;margin-bottom:.7rem;}
.q-dot{width:32px;height:32px;border-radius:50%;border:2px solid #e0ddf7;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#bbb;transition:all .3s;}
.q-dot.correct{background:#9FE1CB;border-color:#5DCAA5;color:#085041;}
.q-dot.wrong{background:#F5C4B3;border-color:#F0997B;color:#4A1B0C;}
.q-dot.current{border-color:#7F77DD;background:#EEEDFE;color:#534AB7;}

.progress-info{text-align:center;font-size:13px;color:#888;margin-bottom:5px;}
.progress-wrap{height:8px;background:#e8e5ff;border-radius:4px;margin-bottom:1rem;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#7F77DD,#5DCAA5);border-radius:4px;transition:width .4s ease;}

.problem-card{background:#fff;border:2px solid #e8e5ff;border-radius:20px;padding:1.8rem 1.2rem;text-align:center;margin-bottom:1rem;box-shadow:0 4px 20px rgba(83,74,183,.08);}
.problem-text{font-size:44px;font-weight:800;color:#3C3489;letter-spacing:2px;margin-bottom:1.4rem;}
.answer-row{display:flex;align-items:center;justify-content:center;gap:10px;}
#answer-input{width:120px;height:54px;text-align:center;font-size:28px;font-family:'Nunito',sans-serif;font-weight:700;border:2px solid #e0ddf7;border-radius:12px;background:#f5f3ff;color:#3C3489;outline:none;}
#answer-input:focus{border-color:#7F77DD;background:#fff;}
.submit-btn{height:54px;padding:0 22px;border-radius:12px;background:#534AB7;color:#fff;border:none;font-size:16px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(83,74,183,.25);touch-action:manipulation;}
.submit-btn:disabled{background:#ccc;box-shadow:none;cursor:default;}

.feedback{border-radius:14px;padding:1rem 1.1rem;margin-bottom:1rem;font-size:14px;line-height:1.7;display:none;}
.feedback.correct{background:#E1F5EE;border:1.5px solid #5DCAA5;color:#085041;}
.feedback.wrong{background:#FAECE7;border:1.5px solid #F0997B;color:#4A1B0C;}

.next-btn{width:100%;height:48px;border-radius:12px;background:#EEEDFE;border:1.5px solid #c5c0f0;font-size:15px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;color:#534AB7;display:none;margin-bottom:1rem;touch-action:manipulation;}

/* MODAL */
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center;padding:0;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:1.4rem;width:100%;max-height:82vh;overflow-y:auto;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.modal-title{font-size:17px;font-weight:800;color:#3C3489;}
.modal-close{width:34px;height:34px;border-radius:50%;background:#f5f3ff;border:none;cursor:pointer;font-size:18px;color:#534AB7;font-weight:700;touch-action:manipulation;}
.teach-section{margin-bottom:1.1rem;}
.teach-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:.4rem;}
.teach-text{font-size:14px;line-height:1.7;color:#333;}
.viz-box{background:#f5f3ff;border-radius:14px;padding:1rem;margin:.8rem 0;text-align:center;}
.step-list{list-style:none;counter-reset:steps;}
.step-list li{counter-increment:steps;display:flex;gap:10px;align-items:flex-start;margin-bottom:.65rem;font-size:13px;line-height:1.5;}
.step-list li::before{content:counter(steps);min-width:24px;height:24px;background:#534AB7;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;}
.times-table{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:.6rem;}
.tt-cell{background:#EEEDFE;border-radius:7px;padding:5px 2px;text-align:center;font-size:11px;font-weight:700;color:#534AB7;}
.tt-cell.hdr{background:#534AB7;color:#fff;}
.dot-grid{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:.4rem 0;}
.dot{width:18px;height:18px;border-radius:50%;background:#7F77DD;display:inline-block;}
.dot.g2{background:#5DCAA5;}
.dot.red{background:#F0997B;}
.group-box{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:.5rem 0;}
.grp{border:2px solid #7F77DD;border-radius:10px;padding:6px 8px;display:flex;gap:4px;flex-wrap:wrap;align-items:center;justify-content:center;}
.grp .dot{width:13px;height:13px;}

/* REPORT */
.report-card{background:#fff;border:2px solid #e8e5ff;border-radius:20px;padding:1.4rem;margin-bottom:1rem;display:none;box-shadow:0 4px 20px rgba(83,74,183,.08);}
.report-title{font-size:20px;font-weight:800;color:#3C3489;text-align:center;margin-bottom:1rem;}
.report-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.r-stat{background:#f5f3ff;border-radius:12px;padding:.7rem;text-align:center;}
.r-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.r-val{font-size:22px;font-weight:800;color:#3C3489;}
.q-list{border-top:1.5px solid #f0eeff;padding-top:.7rem;}
.q-row{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid #f5f3ff;font-size:13px;}
.q-row:last-child{border-bottom:none;}
.q-tag{min-width:20px;font-weight:800;font-size:15px;}
.q-tag.ok{color:#0F6E56;}
.q-tag.no{color:#993C1D;}
.q-detail{color:#333;flex:1;line-height:1.5;}
.q-hint{font-size:12px;color:#666;margin-top:3px;line-height:1.55;}
.email-btn{width:100%;height:52px;border-radius:12px;background:#534AB7;color:#fff;border:none;font-size:16px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;margin-bottom:9px;box-shadow:0 3px 12px rgba(83,74,183,.25);touch-action:manipulation;}
.restart-btn{width:100%;height:46px;border-radius:12px;background:#f5f3ff;border:1.5px solid #e0ddf7;font-size:15px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;color:#534AB7;touch-action:manipulation;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="stars" id="stars">⭐</div>
    <h1>Math Practice ✏️</h1>
    <p id="level-desc">Level 1 — Single digit / 个位数</p>
  </div>

  <div class="op-tabs">
    <button class="op-btn active" data-op="+">+</button>
    <button class="op-btn" data-op="-">−</button>
    <button class="op-btn" data-op="×">×</button>
    <button class="op-btn" data-op="÷">÷</button>
  </div>

  <div class="level-bar">
    <div class="level-pill active" data-level="1">Level 1</div>
    <div class="level-pill" data-level="2">Level 2</div>
    <div class="level-pill" data-level="3">Level 3</div>
    <div class="level-pill" data-level="4">Level 4</div>
    <div class="level-pill" data-level="5">Level 5</div>
  </div>

  <div class="learn-bar">
    <button class="learn-btn" id="learn-btn">📖 Learn how / 学习方法</button>
  </div>

  <div class="q-dots" id="q-dots">
    <div class="q-dot current">1</div>
    <div class="q-dot">2</div>
    <div class="q-dot">3</div>
    <div class="q-dot">4</div>
    <div class="q-dot">5</div>
  </div>

  <div class="progress-info" id="progress-info">Question 1 of 5</div>
  <div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div class="problem-card" id="problem-card">
    <div class="problem-text" id="problem">3 + 5 = ?</div>
    <div class="answer-row">
      <input type="number" id="answer-input" placeholder="?" inputmode="numeric" autocomplete="off"/>
      <button class="submit-btn" id="submit-btn">Check ✓</button>
    </div>
  </div>

  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn">Next / 下一题 →</button>

  <div class="report-card" id="report-card">
    <div class="report-title" id="report-title">Level Complete! 🎉</div>
    <div class="report-summary">
      <div class="r-stat"><div class="r-label">Correct</div><div class="r-val" id="r-correct">0/5</div></div>
      <div class="r-stat"><div class="r-label">Points</div><div class="r-val" id="r-score">0</div></div>
      <div class="r-stat"><div class="r-label">Rating</div><div class="r-val" id="r-rating">⭐</div></div>
    </div>
    <div class="q-list" id="q-list"></div>
    <br>
    <button class="email-btn" id="email-btn">📧 Send Report to Parent / 发报告给家长</button>
    <button class="restart-btn" id="restart-btn">🔄 Try Again / Next Level</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Learn</div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const PARENT_EMAIL='Rexzhiwc@icloud.com';
const TOTAL_Q=5;
const levels={
  1:{range:[1,9],  desc:'Level 1 — Single digit / 个位数'},
  2:{range:[1,20], desc:'Level 2 — Up to 20 / 20以内'},
  3:{range:[1,50], desc:'Level 3 — Up to 50 / 50以内'},
  4:{range:[1,99], desc:'Level 4 — Up to 99 / 99以内'},
  5:{range:[1,999],desc:'Level 5 — Large numbers / 大数字'},
};
let state={op:'+',level:1,qIndex:0,questions:[],results:[]};

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function makeQuestion(){
  const {range}=levels[state.level];
  let a,b,answer;
  const op=state.op;
  if(op==='+'){a=rand(range[0],range[1]);b=rand(range[0],range[1]);answer=a+b;}
  else if(op==='-'){a=rand(range[0],range[1]);b=rand(1,a);answer=a-b;}
  else if(op==='×'){const m=state.level<=2?5:state.level<=3?9:12;a=rand(1,m);b=rand(1,m);answer=a*b;}
  else{const m=state.level<=2?5:state.level<=3?9:12;b=rand(1,m);answer=rand(1,m);a=b*answer;}
  return{a,b,op,answer,display:`${a} ${op} ${b}`};
}

function buildLevel(){
  state.qIndex=0;state.results=[];
  state.questions=Array.from({length:TOTAL_Q},makeQuestion);
  showQuestion();
}

function showQuestion(){
  const q=state.questions[state.qIndex];
  document.getElementById('problem').textContent=q.display+' = ?';
  document.getElementById('answer-input').value='';
  document.getElementById('feedback').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('submit-btn').disabled=false;
  document.getElementById('problem-card').style.display='block';
  document.getElementById('report-card').style.display='none';
  document.getElementById('progress-info').textContent=`Question ${state.qIndex+1} of ${TOTAL_Q}`;
  document.getElementById('progress').style.width=((state.qIndex/TOTAL_Q)*100)+'%';
  updateDots();
}

function updateDots(){
  document.querySelectorAll('.q-dot').forEach((d,i)=>{
    d.className='q-dot'; d.textContent=i+1;
    if(i<state.results.length){d.classList.add(state.results[i].correct?'correct':'wrong');d.textContent=state.results[i].correct?'✓':'✗';}
    else if(i===state.qIndex){d.classList.add('current');}
  });
}

// ── BUILT-IN SMART FEEDBACK (no API needed) ───────────────────
function getFeedback(q, userAns){
  const {a,b,op,answer}=q;
  const diff=userAns-answer;
  let en='', zh='';

  if(op==='+'){
    if(Math.abs(diff)===1){
      en=`So close! You were just ${diff>0?'1 too high':'1 too low'}. Try counting on your fingers: start at ${a}, then count up ${b} more.`;
      zh=`非常接近！你只差了1。试试用手指数：从${a}开始，再数${b}个。`;
    } else {
      en=`The answer is ${answer}. Remember: ${a} + ${b} means starting at ${a} and counting up ${b} more steps.`;
      zh=`答案是${answer}。记住：${a}+${b}就是从${a}开始，再往上数${b}步。`;
    }
  } else if(op==='-'){
    if(userAns===a+b){
      en=`Oops! It looks like you added instead of subtracted. ${a} − ${b} means taking ${b} away from ${a}.`;
      zh=`哎呀！你好像做了加法。${a}−${b}是从${a}里拿走${b}个。`;
    } else if(a>=10 && b>=1 && (a%10)<(b%10)){
      en=`This one needs borrowing! The ones digit of ${a} is smaller than ${b%10}, so we borrow 10 from the tens column. Try again step by step!`;
      zh=`这题需要借位！${a}的个位比${b%10}小，要向十位借一个10。一步一步来！`;
    } else {
      en=`Not quite. ${a} − ${b} = ${answer}. Try counting backwards from ${a} by ${b} steps.`;
      zh=`差一点。${a}−${b}=${answer}。试试从${a}往回数${b}步。`;
    }
  } else if(op==='×'){
    if(userAns===a+b){
      en=`It looks like you added instead of multiplied! ${a} × ${b} means adding ${a} a total of ${b} times: ${Array.from({length:b},()=>a).join(' + ')} = ${answer}.`;
      zh=`你好像做了加法！${a}×${b}是把${a}加${b}次：${Array.from({length:b},()=>a).join('+')}=${answer}。`;
    } else {
      en=`The answer is ${answer}. Remember: ${a} × ${b} means ${b} groups of ${a}. Try the times table!`;
      zh=`答案是${answer}。记住：${a}×${b}就是${b}组${a}个。试试查乘法表！`;
    }
  } else {
    en=`The answer is ${answer}. Think of it as multiplication: what number times ${b} equals ${a}? That number is ${answer}!`;
    zh=`答案是${answer}。用乘法来想：什么数乘以${b}等于${a}？那就是${answer}！`;
  }
  return {en, zh};
}

// ── TEACHING CONTENT ──────────────────────────────────────────
function teachingHTML(op){
  if(op==='+') return `
    <div class="teach-section">
      <div class="teach-label">What is Addition? / 什么是加法？</div>
      <div class="teach-text">Addition means putting two groups <b>together</b>.<br>加法就是把两组东西<b>合在一起</b>。</div>
    </div>
    <div class="viz-box">
      <div style="font-size:13px;color:#534AB7;font-weight:700;margin-bottom:8px;">3 + 4 = ?</div>
      <div class="dot-grid">${'<span class="dot"></span>'.repeat(3)}</div>
      <div style="font-size:18px;margin:4px 0;color:#534AB7;">+</div>
      <div class="dot-grid">${'<span class="dot g2"></span>'.repeat(4)}</div>
      <div style="font-size:20px;margin-top:8px;font-weight:800;color:#3C3489;">= 7 ⭐</div>
    </div>
    <div class="teach-section">
      <div class="teach-label">Steps / 步骤</div>
      <ul class="step-list">
        <li><span>Start with the <b>bigger</b> number. / 从<b>大</b>的数字开始。</span></li>
        <li><span>Count <b>up</b> by the smaller number. / 再往上数小的数字。</span></li>
        <li><span>Where you stop = the answer! / 停下来的数字就是答案！</span></li>
      </ul>
    </div>`;

  if(op==='-') return `
    <div class="teach-section">
      <div class="teach-label">What is Subtraction? / 什么是减法？</div>
      <div class="teach-text">Subtraction means <b>taking away</b>.<br>减法就是<b>拿走</b>一些东西。</div>
    </div>
    <div class="viz-box">
      <div style="font-size:13px;color:#534AB7;font-weight:700;margin-bottom:8px;">7 − 3 = ?</div>
      <div class="dot-grid">
        ${'<span class="dot"></span>'.repeat(4)}${'<span class="dot red"></span>'.repeat(3)}
      </div>
      <div style="font-size:12px;color:#F0997B;margin:6px 0;">❌ Take away 3 red dots / 拿走3个红点</div>
      <div style="font-size:20px;font-weight:800;color:#3C3489;">= 4 ⭐</div>
    </div>
    <div class="teach-section">
      <div class="teach-label">Borrowing (借位) — for harder sums</div>
      <div class="teach-text" style="margin-bottom:.6rem;">When the top digit is <b>smaller</b>, borrow 10 from the left.<br>当上面的数字<b>比较小</b>，就向左边借一个10。</div>
      <ul class="step-list">
        <li><span><b>32 − 15:</b> Ones: 2 is smaller than 5 → borrow! / 个位：2比5小→借位！</span></li>
        <li><span>Borrow 1 ten → ones become 12. Tens: 3 becomes 2.<br>借一个10→个位变成12，十位3变成2。</span></li>
        <li><span>12 − 5 = 7, then 2 − 1 = 1. Answer: <b>17</b>!<br>12−5=7，2−1=1，答案是<b>17</b>！</span></li>
      </ul>
    </div>`;

  if(op==='×') return `
    <div class="teach-section">
      <div class="teach-label">What is Multiplication? / 什么是乘法？</div>
      <div class="teach-text">Multiplication is <b>fast adding</b> of equal groups!<br>乘法就是把相同的组<b>快速加在一起</b>！</div>
    </div>
    <div class="viz-box">
      <div style="font-size:13px;color:#534AB7;font-weight:700;margin-bottom:6px;">3 × 4 = ? &nbsp;(3 groups of 4 / 3组，每组4个)</div>
      <div class="group-box">
        ${Array.from({length:3},()=>`<div class="grp">${'<span class="dot"></span>'.repeat(4)}</div>`).join('')}
      </div>
      <div style="font-size:14px;margin-top:8px;color:#085041;">4 + 4 + 4 = <b>12</b> ⭐</div>
    </div>
    <div class="teach-section">
      <div class="teach-label">Times Table 1–5 / 乘法口诀表</div>
      <div class="times-table">
        <div class="tt-cell hdr">×</div>${[1,2,3,4,5].map(n=>`<div class="tt-cell hdr">${n}</div>`).join('')}
        ${[1,2,3,4,5].map(r=>`<div class="tt-cell hdr">${r}</div>${[1,2,3,4,5].map(c=>`<div class="tt-cell">${r*c}</div>`).join('')}`).join('')}
      </div>
    </div>
    <div class="teach-section">
      <div class="teach-label">Quick Tips / 小技巧</div>
      <ul class="step-list">
        <li><span>Any number × <b>1</b> = itself. / 任何数×<b>1</b>=它本身。</span></li>
        <li><span>Any number × <b>2</b> = double it. / 任何数×<b>2</b>=加两次。</span></li>
        <li><span>Any number × <b>10</b> = add a zero. / 任何数×<b>10</b>=加个零。</span></li>
      </ul>
    </div>`;

  return `
    <div class="teach-section">
      <div class="teach-label">What is Division? / 什么是除法？</div>
      <div class="teach-text">Division means <b>sharing equally</b>.<br>除法就是<b>平均分配</b>。</div>
    </div>
    <div class="viz-box">
      <div style="font-size:13px;color:#534AB7;font-weight:700;margin-bottom:6px;">12 ÷ 3 = ? &nbsp;(Share 12 into 3 groups / 12个分成3组)</div>
      <div class="group-box">
        ${Array.from({length:3},()=>`<div class="grp">${'<span class="dot"></span>'.repeat(4)}</div>`).join('')}
      </div>
      <div style="font-size:14px;margin-top:8px;color:#085041;">Each group has <b>4</b> → 12 ÷ 3 = <b>4</b> ⭐</div>
    </div>
    <div class="teach-section">
      <div class="teach-label">Division ↔ Multiplication / 除法和乘法互为反向</div>
      <div class="teach-text" style="margin-bottom:.5rem;">If you know <b>3 × 4 = 12</b>, then:<br>如果你知道<b>3×4=12</b>，那么：</div>
      <ul class="step-list">
        <li><span>12 ÷ 3 = <b>4</b></span></li>
        <li><span>12 ÷ 4 = <b>3</b></span></li>
        <li><span>So learning times tables helps with division too! / 所以学好乘法口诀对除法也有帮助！</span></li>
      </ul>
    </div>
    <div class="teach-section">
      <div class="teach-label">Times Table 1–5 (for division) / 乘法口诀（用于除法）</div>
      <div class="times-table">
        <div class="tt-cell hdr">×</div>${[1,2,3,4,5].map(n=>`<div class="tt-cell hdr">${n}</div>`).join('')}
        ${[1,2,3,4,5].map(r=>`<div class="tt-cell hdr">${r}</div>${[1,2,3,4,5].map(c=>`<div class="tt-cell">${r*c}</div>`).join('')}`).join('')}
      </div>
    </div>`;
}

// ── MODAL ─────────────────────────────────────────────────────
const opNames={'+':'Addition / 加法','-':'Subtraction / 减法','×':'Multiplication / 乘法','÷':'Division / 除法'};

document.getElementById('learn-btn').addEventListener('click',()=>{
  document.getElementById('modal-title').textContent='📖 '+opNames[state.op];
  document.getElementById('modal-body').innerHTML=teachingHTML(state.op);
  document.getElementById('modal-bg').classList.add('open');
});
document.getElementById('modal-close').addEventListener('click',()=>document.getElementById('modal-bg').classList.remove('open'));
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-bg'))document.getElementById('modal-bg').classList.remove('open');});

// ── CHECK ANSWER ──────────────────────────────────────────────
document.getElementById('submit-btn').addEventListener('click',()=>{
  const val=parseInt(document.getElementById('answer-input').value);
  if(isNaN(val)){document.getElementById('answer-input').focus();return;}
  const q=state.questions[state.qIndex];
  document.getElementById('submit-btn').disabled=true;
  const correct=(val===q.answer);
  const fb=document.getElementById('feedback');
  let hint='';
  if(correct){
    fb.className='feedback correct';
    const praise=[['Excellent! 🌟','太棒了！'],['Great job! 🎉','做得很好！'],['Perfect! 💫','完美！'],['Well done! 👏','干得漂亮！'],['Awesome! 🚀','厉害！']];
    const p=praise[Math.floor(Math.random()*praise.length)];
    fb.textContent=`${p[0]} ${p[1]}  ✓ ${q.answer}`;
    fb.style.display='block';
  } else {
    const {en,zh}=getFeedback(q,val);
    hint=en+'\n'+zh;
    fb.className='feedback wrong';
    fb.innerHTML=`<b>Not quite! 差一点！</b> Answer / 答案 = <b>${q.answer}</b><br><br>${en}<br><br><span style="color:#085041">${zh}</span>`;
    fb.style.display='block';
  }
  state.results.push({q,userAns:val,correct,hint});
  updateDots();
  const isLast=state.qIndex===TOTAL_Q-1;
  document.getElementById('next-btn').style.display='block';
  document.getElementById('next-btn').textContent=isLast?'See my report! 📊 / 查看报告':'Next question / 下一题 →';
});

document.getElementById('next-btn').addEventListener('click',()=>{
  state.qIndex++;
  if(state.qIndex<TOTAL_Q){showQuestion();}else{showReport();}
});

document.getElementById('answer-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('submit-btn').click();});

// ── REPORT ────────────────────────────────────────────────────
function showReport(){
  document.getElementById('problem-card').style.display='none';
  document.getElementById('feedback').style.display='none';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('report-card').style.display='block';
  document.getElementById('progress').style.width='100%';
  document.getElementById('progress-info').textContent='Level complete! 🎉';
  const numCorrect=state.results.filter(r=>r.correct).length;
  const rating=numCorrect>=5?'⭐⭐⭐':numCorrect>=3?'⭐⭐':'⭐';
  document.getElementById('report-title').textContent=`Level ${state.level} Complete! 🎉`;
  document.getElementById('r-correct').textContent=`${numCorrect}/5`;
  document.getElementById('r-score').textContent=numCorrect*state.level*10;
  document.getElementById('r-rating').textContent=rating;
  document.getElementById('stars').textContent=rating;
  const list=document.getElementById('q-list');
  list.innerHTML='';
  state.results.forEach(r=>{
    const row=document.createElement('div');
    row.className='q-row';
    row.innerHTML=`<span class="q-tag ${r.correct?'ok':'no'}">${r.correct?'✓':'✗'}</span>
    <div class="q-detail">
      <div><b>${r.q.display} = ${r.q.answer}</b>${r.correct?'':` <span style="color:#F0997B">(you said: ${r.userAns})</span>`}</div>
      ${r.hint?`<div class="q-hint">${r.hint.replace(/\n/g,'<br>')}</div>`:''}
    </div>`;
    list.appendChild(row);
  });
}

document.getElementById('email-btn').addEventListener('click',()=>{
  const numCorrect=state.results.filter(r=>r.correct).length;
  const rating=numCorrect>=5?'★★★':numCorrect>=3?'★★':'★';
  const date=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  let body=`Hi! Here is my math practice report 我的数学练习报告:\n\nDate: ${date}\nLevel: ${state.level}\nOperation: ${state.op}\nScore: ${numCorrect}/5  ${rating}\nPoints: ${numCorrect*state.level*10}\n\n--- Questions ---\n`;
  state.results.forEach((r,i)=>{
    body+=`\nQ${i+1}: ${r.q.display} = ${r.q.answer}  ${r.correct?'✓ CORRECT':'✗ WRONG (answered: '+r.userAns+')'}`;
    if(r.hint)body+=`\n   Feedback: ${r.hint}`;
  });
  body+=`\n\n---\nSent from Math Practice App`;
  const subject=`Math Report – Level ${state.level} – ${numCorrect}/5 ${rating}`;
  window.location.href=`mailto:${PARENT_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
});

document.getElementById('restart-btn').addEventListener('click',()=>buildLevel());

document.querySelectorAll('.op-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.op-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.op=btn.dataset.op;
    buildLevel();
  });
});

document.querySelectorAll('.level-pill').forEach(pill=>{
  pill.addEventListener('click',()=>{
    state.level=parseInt(pill.dataset.level);
    document.querySelectorAll('.level-pill').forEach(p=>p.classList.toggle('active',p===pill));
    document.getElementById('level-desc').textContent=levels[state.level].desc;
    buildLevel();
  });
});

buildLevel();
</script>
</body>
</html>
